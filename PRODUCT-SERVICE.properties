server.port=8081

#mysql configuration
spring.datasource.url=jdbc:mysql://localhost:3306/product_db_m
spring.datasource.username=${SQL_USERNAME}
spring.datasource.password=${SQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#eureka configuration

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# zipkin configuration
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
#debug
logging.level.io.micrometer=DEBUG
logging.level.zipkin2=DEBUG
logging.level.brave=DEBUG
logging.level.org.springframework.boot.actuate.autoconfigure.tracing=DEBUG
